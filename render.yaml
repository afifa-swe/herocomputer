databases:
  - name: herocomputer-db
    plan: free
    databaseName: herocomputer
    user: herocomputer

services:
  - type: web
    name: herocomputer
    plan: free
    runtime: docker
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: HeroComputer
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: ""
      - key: APP_URL
        value: https://herocomputer.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: herocomputer-db
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
